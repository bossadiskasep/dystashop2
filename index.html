<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dana Kaget</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#008cff,#0066ff);
min-height:100vh;
text-align:center;
color:white;
}

.header{
padding:60px 20px;
}

.header h1{
font-size:60px;
font-weight:bold;
}

.header p{
font-size:24px;
margin-top:15px;
}

.card{
background:white;
color:black;
width:90%;
max-width:800px;
margin:auto;
border-radius:25px;
padding:30px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.gift{
font-size:100px;
}

.judul{
font-size:45px;
font-weight:bold;
margin-top:15px;
}

.sub{
font-size:22px;
margin-top:10px;
}

.btn{
margin-top:30px;
background:#ffd400;
color:#003399;
border:none;
width:100%;
padding:25px;
font-size:40px;
font-weight:bold;
border-radius:20px;
cursor:pointer;
}

.timer-box{
margin-top:25px;
background:#eef5ff;
padding:25px;
border-radius:20px;
}

#timer{
font-size:80px;
font-weight:bold;
color:#0066ff;
}

.fitur{
display:flex;
justify-content:space-around;
margin-top:25px;
font-size:18px;
}

.footer{
margin-top:30px;
padding-bottom:30px;
font-size:20px;
}
</style>
</head>

<body>

<div class="header">
<h1>🎁 DANA KAGET</h1>
<p>Klaim hadiah spesial untuk kamu!</p>
</div>

<div class="card">

<div class="gift">🎁</div>

<div class="judul">
KLAIM HADIAH SEKARANG!
</div>

<div class="sub">
Jangan lewatkan kesempatan ini.
</div>

<button class="btn" onclick="mulai()">
🎁 KLAIM SEKARANG
</button>

<div class="timer-box">
<p>Tunggu sebentar sebelum melanjutkan</p>
<div id="timer">10</div>
</div>

<div class="fitur">
<div>✅ Aman</div>
<div>⚡ Cepat</div>
<div>🎁 Gratis</div>
</div>

</div>

<div class="footer">
🔒 Data Anda aman bersama kami
</div>

<script>

document.getElementById("timer").style.display="none";

function mulai(){

let s=10;

document.getElementById("timer").style.display="block";

let x=setInterval(function(){

document.getElementById("timer").innerHTML=s;

s--;

if(s<0){

clearInterval(x);

window.location.href=
"https://go.paid4link.com/hz3ICfSf";

}

},1000);

}

</script>

</body>
</html>
